feeds:
  anthropic:
    - url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_news.xml"
      label: "Anthropic News"
    - url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_research.xml"
      label: "Anthropic Research"
    - url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_anthropic_engineering.xml"
      label: "Anthropic Engineering"
    - url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_claude.xml"
      label: "Anthropic Claude"
  openai:
    - url: "https://openai.com/news/rss.xml"
      label: "OpenAI News"
  meta:
    - url: "https://raw.githubusercontent.com/Olshansk/rss-feeds/main/feeds/feed_meta_ai.xml"
      label: "Meta AI"
    - url: "https://research.facebook.com/feed/"
      label: "Meta Research"
    - url: "https://engineering.fb.com/feed/"
      label: "Meta Engineering"
  google:
    - url: "https://deepmind.google/blog/rss.xml"
      label: "DeepMind Blog"
    - url: "https://blog.google/technology/ai/rss"
      label: "Google AI Blog"
    - url: "https://research.google/blog/rss/"
      label: "Google Research"
  microsoft:
    - url: "https://blogs.microsoft.com/ai/feed/"
      label: "Microsoft AI"
  sequoia:
    - url: "https://sequoiacap.com/feed/"
      label: "Sequoia Capital"

arxiv:
  exclude_keywords:
    - image
    - vision
    - visual
    - multimodal
    - video
    - pixel
    - diffusion
    - object detection
    - segmentation
    - medical imaging
    - text-to-image
    - speech recognition
    - 3D reconstruction
    - autonomous driving
  feeds:
    - url: "https://rss.arxiv.org/rss/cs.AI"
      label: "arXiv cs.AI"
    - url: "https://rss.arxiv.org/rss/cs.MA"
      label: "arXiv cs.MA"
    - url: "https://rss.arxiv.org/rss/cs.CL"
      label: "arXiv cs.CL"

# Blog pages without native RSS feeds — fetched via HTML scraping
scrape:
  perplexity:
    - url: "https://www.perplexity.ai/blog"
      label: "Perplexity Blog"
  glean:
    - url: "https://www.glean.com/blog"
      label: "Glean Blog"
  sierra:
    - url: "https://sierra.ai/blog"
      label: "Sierra Blog"
  scale_ai:
    - url: "https://scale.com/blog"
      label: "Scale AI Blog"
  a16z:
    - url: "https://a16z.com/news-content/"
      label: "a16z Blog"
      path_match: "a16z.com/"
      min_title_length: 30
