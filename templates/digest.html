<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Georgia, 'Times New Roman', serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:20px 10px;">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#1a1a2e; padding:30px 40px; text-align:center;">
              <h1 style="margin:0; color:#ffffff; font-size:24px; font-weight:normal; letter-spacing:1px;">Industry News Digest</h1>
              <p style="margin:8px 0 0 0; color:#a0a0b0; font-size:14px;">{{ date }}</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:30px 40px;">
              {{ content }}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f8f8fa; padding:20px 40px; text-align:center; border-top:1px solid #e0e0e0;">
              <p style="margin:0; color:#888888; font-size:12px;">Generated automatically from RSS feeds and email newsletters.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
