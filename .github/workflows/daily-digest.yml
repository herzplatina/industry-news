name: Daily Industry Digest

on:
  schedule:
    - cron: '0 14 * * *'  # 7 AM PT (UTC-7)
  workflow_dispatch: # manual trigger

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Restore checkpoint
        uses: actions/cache/restore@v4
        with:
          path: data/checkpoint.json
          key: digest-checkpoint-
          restore-keys: |
            digest-checkpoint-

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT_EMAIL: ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python -m src.main --hours 36

      - name: Save checkpoint
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/checkpoint.json
          key: digest-checkpoint-${{ github.run_id }}

      - name: Upload digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-previews
          path: |
            digest_preview.html
            twitter_digest_preview.html
          retention-days: 7
